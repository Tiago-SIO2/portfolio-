<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelda Rupee Clicker | Tiago ZHOU</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style -->
    <link rel="stylesheet" href="style.css">
</head>

<body
    style="display: flex; flex-direction: column; min-height: 100vh; justify-content: center; align-items: center; padding: 20px;">

    <a href="index.html#projects" class="btn-secondary" style="position: absolute; top: 20px; left: 20px;">
        <i class="fas fa-arrow-left"></i> Retour au Portfolio
    </a>

    <div class="zelda-game-container glass-card"
        style="width: 100%; max-width: 800px; padding: 40px; border-radius: 20px;">
        <h2
            style="text-align: center; color: var(--rupee-green); margin-bottom: 30px; font-family: var(--font-primary); font-size: 2.5rem;">
            <i class="fas fa-gamepad"></i> Zelda Rupee Clicker
        </h2>

        <div class="game-ui"
            style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 40px;">

            <!-- Left: Clicker Area -->
            <div class="clicker-area" style="flex: 1; text-align: center; min-width: 250px;">
                <div class="score-display">
                    <span style="font-size: 1.2rem; font-weight: bold;">Score:</span>
                    <div style="font-size: 4rem; font-family: var(--font-primary); color: var(--rupee-green); font-weight: 800; text-shadow: 0 0 15px rgba(46, 204, 113, 0.5);"
                        id="rupee-score">0</div>
                    <span style="font-size: 1rem; color: var(--text-secondary);" id="rupees-per-sec">0 rubis /
                        sec</span>
                </div>

                <div class="main-rupee-container"
                    style="margin: 50px auto; width: 180px; height: 180px; cursor: pointer; position: relative;">
                    <img src="assets/green_rupee.png" alt="Zelda Rupee" id="main-rupee"
                        style="width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 20px rgba(46, 204, 113, 0.8)); transition: transform 0.1s; user-select: none;">
                </div>
            </div>

            <!-- Right: Upgrades Store -->
            <div class="upgrades-store"
                style="flex: 1; min-width: 300px; background: rgba(0,0,0,0.2); padding: 25px; border-radius: 15px; border: 1px solid var(--border-color);">
                <h4
                    style="margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; font-size: 1.2rem;">
                    Boutique</h4>

                <!-- Upgrade 1: Bigger Wallet -->
                <div class="upgrade-item" id="upg-click"
                    style="display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 10px; margin-bottom: 15px; cursor: pointer; transition: all 0.2s;">
                    <div class="upg-info" style="display: flex; align-items: center; gap: 15px;">
                        <img src="../assets/blue_rupee.png" alt="Blue Rupee" style="width: 40px; height: 40px;">
                        <div>
                            <h5 style="margin:0; font-size: 1.1rem;">Bourse Bleue</h5>
                            <span style="font-size: 0.9rem; color: var(--text-secondary);">+1 Rubis / Clic</span>
                        </div>
                    </div>
                    <div class="upg-cost" style="text-align: right;">
                        <span style="font-weight: bold; font-size: 1.2rem; color: var(--rupee-green);"
                            id="cost-click">50</span> <i class="fas fa-gem" style="color:var(--rupee-green);"></i>
                        <div style="font-size: 0.85rem; color: var(--text-secondary);">Lvl: <span
                                id="lvl-click">0</span></div>
                    </div>
                </div>

                <!-- Upgrade 2: Master Sword -->
                <div class="upgrade-item" id="upg-auto"
                    style="display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 10px; margin-bottom: 15px; cursor: pointer; transition: all 0.2s;">
                    <div class="upg-info" style="display: flex; align-items: center; gap: 15px;">
                        <img src="assets/master_sword.png" alt="Master Sword"
                            style="width: 40px; height: 40px; object-fit: contain;">
                        <div>
                            <h5 style="margin:0; font-size: 1.1rem;">Épée de Légende</h5>
                            <span style="font-size: 0.9rem; color: var(--text-secondary);">+2 Rubis / Sec</span>
                        </div>
                    </div>
                    <div class="upg-cost" style="text-align: right;">
                        <span style="font-weight: bold; font-size: 1.2rem; color: var(--rupee-green);"
                            id="cost-auto">150</span> <i class="fas fa-gem" style="color:var(--rupee-green);"></i>
                        <div style="font-size: 0.85rem; color: var(--text-secondary);">Lvl: <span id="lvl-auto">0</span>
                        </div>
                    </div>
                </div>

                <button id="reset-game"
                    style="margin-top: 20px; width: 100%; padding: 12px; background: transparent; border: 1px solid #ef4444; color: #ef4444; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: background 0.3s;">
                    <i class="fas fa-trash"></i> Réinitialiser la partie
                </button>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script src="../js/zelda-clicker.js"></script>
</body>

</html>
